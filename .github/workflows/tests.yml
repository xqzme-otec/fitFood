name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        # Тесты используют изолированную SQLite-БД (см. tests/conftest.py),
        # PostgreSQL не требуется. Запускаются и обычные тесты, и QRT (маркер qrt).
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Enforce critical-module coverage (>= 30% each)
        run: python scripts/check_critical_coverage.py coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
